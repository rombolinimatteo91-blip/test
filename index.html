<!DOCTYPE html>
<html>
<head>
    <title>Super Babbo Ale</title>
    <script src="https://unpkg.com/kaboom@3000.0.1/dist/kaboom.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #000; }
        canvas { border: 4px solid #ffcb05; }
    </style>
</head>
<body>
<script>
// Inizializza Kaboom
kaboom({
    background: [135, 206, 235], // Colore cielo
    width: 800,
    height: 600,
});

// Caricamento Sprite (usiamo placeholder colorati, ma puoi sostituirli con immagini)
loadBean(); // Carica l'icona di Kaboom come personaggio temporaneo

// Definiamo i livelli
const LEVEL_CONFIG = {
    tileWidth: 40,
    tileHeight: 40,
    tiles: {
        "=": () => [
            rect(40, 40),
            area(),
            body({ isStatic: true }),
            color(139, 69, 19),
            anchor("bot"),
            "ground"
        ],
        "^": () => [
            rect(40, 20),
            area(),
            color(255, 0, 0),
            anchor("bot"),
            "danger" // Nemico o spuntone
        ],
        "$": () => [
            circle(15),
            area(),
            color(255, 255, 0),
            anchor("bot"),
            "coin"
        ],
    },
}

const levels = [
    [
        "                          ",
        "      $                   ",
        "     ====                 ",
        "                          ",
        "               $$         ",
        "             ======       ",
        "                          ",
        "    ^^      ^      ^^     ",
        "==========================",
    ]
];

// Scena principale
scene("game", ({ levelIdx } = { levelIdx: 0 }) => {
    
    const level = addLevel(levels[levelIdx], LEVEL_CONFIG);

    // Aggiungi il protagonista: Super Babbo Ale
    const player = add([
        sprite("bean"),
        pos(80, 40),
        area(),
        body(),
        anchor("bot"),
    ]);

    // Testo Titolo
    add([
        text("SUPER BABBO ALE", { size: 24 }),
        pos(20, 20),
        color(255, 203, 5),
    ]);

    // Controlli
    onKeyDown("left", () => {
        player.move(-300, 0);
    });

    onKeyDown("right", () => {
        player.move(300, 0);
    });

    onKeyPress("space", () => {
        if (player.isGrounded()) {
            player.jump(800);
        }
    });

    // Interazioni
    player.onCollide("danger", () => {
        destroy(player);
        wait(1, () => go("game")); // Ricomincia
    });

    player.onCollide("coin", (coin) => {
        destroy(coin);
        burp(); // Suono divertente
    });

    // Caduta fuori dal mondo
    player.onUpdate(() => {
        if (player.pos.y > 800) {
            go("game");
        }
    });
});

// Avvia il gioco
go("game");

</script>
</body>
</html>
